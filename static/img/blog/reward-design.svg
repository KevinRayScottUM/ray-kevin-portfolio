  <text x="58" y="76" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Reward Design for Grounded Agents</text>
  <g font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">
    <rect x="62" y="128" width="114" height="52" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="90" y="158" fill="#1d4ed8">Answer</text>
    <rect x="238" y="128" width="124" height="52" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="264" y="158" fill="#047857">Evidence</text>
    <rect x="424" y="128" width="112" height="52" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
