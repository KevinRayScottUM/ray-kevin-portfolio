      <path d="M0 44h460"/><path d="M0 88h460"/><path d="M0 132h460"/><path d="M0 176h460"/>
      <path d="M64 0v218"/><path d="M138 0v218"/><path d="M212 0v218"/><path d="M286 0v218"/><path d="M360 0v218"/>
    </g>
    <path d="M18 168c42-98 96-28 142-66 38-31 58-104 106-34 48 70 80 142 122 38 22-56 54-78 76-28" fill="none" stroke="url(#curve)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M244 104c22-64 58-70 76-86" fill="none" stroke="#22d3ee" stroke-width="3" opacity=".65"/>
