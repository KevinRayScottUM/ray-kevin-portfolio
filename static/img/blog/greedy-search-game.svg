<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="Possible-state greedy search game strategy">
  <rect width="600" height="360" fill="#f8fafc"/>
  <rect x="34" y="38" width="532" height="284" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="58" y="76" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Possible-State Greedy Search</text>
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">
    <text x="74" y="118">state = (N, P)</text>
    <text x="74" y="140">response updates frontier</text>
    <text x="74" y="162">guess uses 60% quantile</text>
  </g>
  <g fill="none" stroke="#2563eb" stroke-width="2.4">
    <path d="M292 90v56"/>
    <path d="M292 146l-116 72M292 146l116 72M292 146v72"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700">
    <circle cx="292" cy="90" r="32" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="269" y="95" fill="#1d4ed8">S0</text>
    <circle cx="176" cy="218" r="34" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="153" y="223" fill="#c2410c">too high</text>
    <circle cx="292" cy="218" r="34" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="271" y="223" fill="#047857">match</text>
    <circle cx="408" cy="218" r="34" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="386" y="223" fill="#6d28d9">too low</text>
  </g>
  <g fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="13">
    <text x="128" y="286">filter: old N &lt; g</text>
    <text x="340" y="286">advance: N := N + P</text>
  </g>
</svg>
