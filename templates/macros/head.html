{% macro stylesheet() %}
<script>
  (function () {
    try {
      if (window.matchMedia && window.matchMedia("(pointer: fine)").matches) {
        document.documentElement.classList.add("tensorcat-cursor-enabled");
      }

      if (window.sessionStorage && window.sessionStorage.getItem("tensorcat-nav-transition")) {
        document.documentElement.classList.add("portfolio-transition-preload");
      }
    } catch (_error) {}
  })();
</script>
<link rel="stylesheet" href="{{ get_url(path="styles/styles.css") | safe }}" />
<link rel="stylesheet" href="{{ get_url(path="styles/custom.css") | safe }}" />
<script defer src="{{ get_url(path="js/nav-motion.js") | safe }}"></script>
<script defer src="{{ get_url(path="js/tensorcat-cursor.js") | safe }}"></script>
{% endmacro %}
